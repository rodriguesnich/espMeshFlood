[platformio]
src_dir = src
test_dir = test
build_dir = /tmp/espMeshFlood_build
default_envs = esp32_serial

# ---------------------------------------------------------------------------
# Shared ESP32 settings — referenced via ${common_esp32.key} interpolation
# ---------------------------------------------------------------------------
[common_esp32]
platform     = espressif32@6.5.0
board        = esp32dev
framework    = arduino
upload_port  = /dev/ttyUSB0
upload_speed = 921600
extra_scripts = pre:scripts/proto_build.py
lib_deps_base =
    nanopb/Nanopb@0.4.8
build_flags_base =
    -std=gnu++14
    -D WIFI_SSID=\"\"
    -D WIFI_PASS=\"\"

# ---------------------------------------------------------------------------
# Serial firmware  (USB serial framing — use with minimal_mesh_node example)
# Flash:   pio run -e esp32_serial --target upload
# Monitor: pio device monitor -e esp32_serial
# ---------------------------------------------------------------------------
[env:esp32_serial]
platform      = ${common_esp32.platform}
board         = ${common_esp32.board}
framework    = ${common_esp32.framework}
upload_port  = ${common_esp32.upload_port}
upload_speed = ${common_esp32.upload_speed}
monitor_port  = /dev/ttyUSB0
monitor_speed = 115200
test_ignore   = *
build_flags =
    ${common_esp32.build_flags_base}
    -D HOST_TRANSPORT_SERIAL
lib_deps =
    ${common_esp32.lib_deps_base}
extra_scripts = ${common_esp32.extra_scripts}

# ---------------------------------------------------------------------------
# BLE firmware  (Web Bluetooth GATT — use with bluetooth_mesh_node example)
# Flash:   pio run -e esp32_ble --target upload
# Serial monitor shows debug output only (no framed protocol).
# ---------------------------------------------------------------------------
[env:esp32_ble]
platform      = ${common_esp32.platform}
board         = ${common_esp32.board}
framework    = ${common_esp32.framework}
upload_port  = ${common_esp32.upload_port}
upload_speed = ${common_esp32.upload_speed}
monitor_port  = /dev/ttyUSB0
monitor_speed = 115200
test_ignore   = *
build_flags =
    ${common_esp32.build_flags_base}
    -D HOST_TRANSPORT_BLE
lib_deps =
    ${common_esp32.lib_deps_base}
    h2zero/NimBLE-Arduino@^1.4.1
extra_scripts = ${common_esp32.extra_scripts}

# ---------------------------------------------------------------------------
# Native unit tests  (GoogleTest on desktop — no hardware required)
# Run:  pio test -e native_test
# ---------------------------------------------------------------------------
[env:native_test]
platform       = native
test_framework = googletest
build_flags =
    -std=c++17
    -Wall
    -Wextra
    -D UNIT_TESTING
lib_deps =
    nanopb/Nanopb@0.4.8
extra_scripts =
    pre:scripts/proto_build.py
