[platformio]
src_dir = src
test_dir = test
build_dir = /tmp/espMeshFlood_build
default_envs = common_esp32

# ---------------------------------------------------------------------------
# Shared ESP32 settings — referenced via ${common_esp32.key} interpolation
# ---------------------------------------------------------------------------
[env:common_esp32]
platform     = espressif32@6.5.0
board        = esp32dev
framework    = arduino
upload_port  = /dev/ttyUSB0
upload_speed = 921600
extra_scripts = pre:scripts/proto_build.py
lib_deps =
    nanopb/Nanopb@0.4.8
build_flags =
    -std=gnu++14
    -D WIFI_SSID=\"\"
    -D WIFI_PASS=\"\"

# ---------------------------------------------------------------------------
# Native unit tests  (GoogleTest on desktop — no hardware required)
# Run:  pio test -e native_test
# ---------------------------------------------------------------------------
[env:native_test]
platform       = native
test_framework = googletest
build_flags =
    -std=c++17
    -Wall
    -Wextra
    -D UNIT_TESTING
lib_deps =
    nanopb/Nanopb@0.4.8
extra_scripts =
    pre:scripts/proto_build.py
