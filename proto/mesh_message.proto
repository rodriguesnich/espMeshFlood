syntax = "proto3";

package espMeshFlood;

option optimize_for = LITE_RUNTIME;

enum MessageType {
    USER_MESSAGE = 0;
    HEARTBEAT = 1;
}

message MeshMessage {
    uint32 origin_node_id = 1;
    uint32 message_id = 2;
    uint32 sender_id = 3;
    uint64 timestamp = 4;
    MessageType type = 5;
    uint32 ttl = 6;
    bytes payload = 7;
}

message UserMessage {
    string user_name = 1;
    string text_message = 2;
}

message Heartbeat {
    uint32 battery_percent = 1;
    repeated uint32 heard_node_ids = 2;
}